<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNPAGE | Table</title>

    <!--style.cssの読み込み -->
    <link rel="stylesheet" href="../css/style.css" type="text/css">

    <!-- Faviconの設定 -->
    <link rel="icon" href="../favicon.ico" type="image/x-icon">

    <!-- googlefonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru&display=swap" rel="stylesheet">

</head>

<body>
    <header>
        <div class="nav-menu-container">
            <input type="checkbox" id="nav-menu-toggle" title="メニューを開く">
            <label for="nav-menu-toggle" class="nav-menu-button" aria-label="メニューを開く">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </label>
            <a id="nav-title" href="../">SYNPAGE</a>
            <nav class="nav-menu">
                <ul>
                    <li><a href="../">HOME</a></li>
                    <li><a href="../pages/playground.html">Playground</a></li>
                    <li><a href="../pages/count.html">Count</a></li>
                    <li><a href="../pages/table.html">Table</a></li>
                    <li class="dropdown">
                        <div>Documents<span style="margin-left: 1.2em;">▼</span></div>
                        <ul class="dropdown-list fade-in">
                            <li><a href="#">HTML</a></li>
                            <li><a href="#">CSS</a></li>
                            <li><a href="#">JavaScript</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="fade-in">
        <h1>Table</h1>
        <section>
            <h2>ランダムデータの表示</h2>
            <p>Pythonサーバーから取得したランダム生成データを表示します。</p>
            <div id="datatable" class="table-container">
                <div id="loading-overlay">
                    <div class="spinner"></div>
                </div>
                <p id="state">データを取得中...</p>
            </div>
        </section>

    </main>
    <script>
        // Fetch data from the server
        fetch('/api/data') // PythonサーバーのAPIエンドポイントを指定
            .then(response => response.json())
            .then(data => {

                const datatable = document.getElementById('datatable');

                // テーブル要素を作成
                const table = document.createElement('table');
                // テーブルヘッダーとボディを作成
                const thead = document.createElement('thead');
                const tbody = document.createElement('tbody');

                // ヘッダーを動的に生成
                const headers = Object.keys(data[0]);
                const headerRow = document.createElement("tr");

                headers.forEach(key => {
                    const th = document.createElement("th");
                    th.textContent = key;
                    headerRow.appendChild(th);
                });
                thead.appendChild(headerRow);

                // データ行を生成
                data.forEach(item => {
                    const row = document.createElement("tr");
                    headers.forEach(key => {
                        const td = document.createElement("td");
                        td.textContent = item[key];
                        row.appendChild(td);
                    });
                    tbody.appendChild(row);
                });

                table.appendChild(thead);
                table.appendChild(tbody);
                datatable.appendChild(table);
            })
            .catch(error => console.error('Error fetching data:', error)).finally(() => {
                // データ取得完了後に状態メッセージを更新
                const state = document.getElementById('state');
                // stateを削除
                state.remove();

                const overlay = document.getElementById("loading-overlay");
                overlay.style.display = "none";
            });
    </script>
</body>

</html>
